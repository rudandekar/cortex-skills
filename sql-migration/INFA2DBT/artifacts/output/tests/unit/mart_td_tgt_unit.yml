version: 2

unit_tests:
  - name: test_mart_td_tgt_aggregator_sum
    model: mart_td_tgt
    description: "Verify aggregation produces correct sums"
    given:
      - input: source('raw', 'td_src')
        rows:
          - {key_id: 1, amount: 100}
          - {key_id: 1, amount: 200}
          - {key_id: 2, amount: 50}
    expect:
      rows:
        - {key_id: 1, total_amount: 300}
        - {key_id: 2, total_amount: 50}
  - name: test_mart_td_tgt_expression_transform
    model: mart_td_tgt
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'td_src')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
