version: 2

unit_tests:
  - name: test_edwtd_rev_measure_wf_wi_ssc_dep_inv_stack_audit_02_mart_wi_ssc_dep_inv_stack_filter_basic
    model: edwtd_rev_measure_wf_wi_ssc_dep_inv_stack_audit_02_mart_wi_ssc_dep_inv_stack
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'wi_ccm_fiscal_month_ctrl')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_rev_measure_wf_wi_ssc_dep_inv_stack_audit_02_mart_wi_ssc_dep_inv_stack_expression_transform
    model: edwtd_rev_measure_wf_wi_ssc_dep_inv_stack_audit_02_mart_wi_ssc_dep_inv_stack
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'wi_ccm_fiscal_month_ctrl')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
