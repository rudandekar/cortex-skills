version: 2

unit_tests:
  - name: test_edwtd_rev_measure_wf_wi_ccm_ssc_qoh_driver_01_mart_wi_ccm_ssc_qoh_driver_filter_basic
    model: edwtd_rev_measure_wf_wi_ccm_ssc_qoh_driver_01_mart_wi_ccm_ssc_qoh_driver
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'gps_inv_on_hand_ccm')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_rev_measure_wf_wi_ccm_ssc_qoh_driver_01_mart_wi_ccm_ssc_qoh_driver_expression_transform
    model: edwtd_rev_measure_wf_wi_ccm_ssc_qoh_driver_01_mart_wi_ccm_ssc_qoh_driver
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'gps_inv_on_hand_ccm')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
