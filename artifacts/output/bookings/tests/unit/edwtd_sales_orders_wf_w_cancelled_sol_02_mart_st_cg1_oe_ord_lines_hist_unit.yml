version: 2

unit_tests:
  - name: test_edwtd_sales_orders_wf_w_cancelled_sol_02_mart_st_cg1_oe_ord_lines_hist_filter_basic
    model: edwtd_sales_orders_wf_w_cancelled_sol_02_mart_st_cg1_oe_ord_lines_hist
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'ex_cg1_oe_ord_lines_hist')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_sales_orders_wf_w_cancelled_sol_02_mart_st_cg1_oe_ord_lines_hist_expression_transform
    model: edwtd_sales_orders_wf_w_cancelled_sol_02_mart_st_cg1_oe_ord_lines_hist
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'ex_cg1_oe_ord_lines_hist')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
