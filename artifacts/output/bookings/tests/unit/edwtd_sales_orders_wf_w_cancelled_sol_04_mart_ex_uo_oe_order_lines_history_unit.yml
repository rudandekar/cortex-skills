version: 2

unit_tests:
  - name: test_edwtd_sales_orders_wf_w_cancelled_sol_04_mart_ex_uo_oe_order_lines_history_filter_basic
    model: edwtd_sales_orders_wf_w_cancelled_sol_04_mart_ex_uo_oe_order_lines_history
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'ex_cg1_oe_ord_lines_hist')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_sales_orders_wf_w_cancelled_sol_04_mart_ex_uo_oe_order_lines_history_expression_transform
    model: edwtd_sales_orders_wf_w_cancelled_sol_04_mart_ex_uo_oe_order_lines_history
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'ex_cg1_oe_ord_lines_hist')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
