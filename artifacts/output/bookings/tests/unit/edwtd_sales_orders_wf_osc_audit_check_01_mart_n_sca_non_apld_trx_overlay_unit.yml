version: 2

unit_tests:
  - name: test_edwtd_sales_orders_wf_osc_audit_check_01_mart_n_sca_non_apld_trx_overlay_filter_basic
    model: edwtd_sales_orders_wf_osc_audit_check_01_mart_n_sca_non_apld_trx_overlay
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'n_sca_non_apld_trx_overlay')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_sales_orders_wf_osc_audit_check_01_mart_n_sca_non_apld_trx_overlay_expression_transform
    model: edwtd_sales_orders_wf_osc_audit_check_01_mart_n_sca_non_apld_trx_overlay
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'n_sca_non_apld_trx_overlay')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
