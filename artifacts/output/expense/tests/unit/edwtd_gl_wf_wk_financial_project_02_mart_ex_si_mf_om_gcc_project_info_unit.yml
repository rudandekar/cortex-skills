version: 2

unit_tests:
  - name: test_edwtd_gl_wf_wk_financial_project_02_mart_ex_si_mf_om_gcc_project_info_filter_basic
    model: edwtd_gl_wf_wk_financial_project_02_mart_ex_si_mf_om_gcc_project_info
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'st_om_gl_code_combinations')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_gl_wf_wk_financial_project_02_mart_ex_si_mf_om_gcc_project_info_expression_transform
    model: edwtd_gl_wf_wk_financial_project_02_mart_ex_si_mf_om_gcc_project_info
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'st_om_gl_code_combinations')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
