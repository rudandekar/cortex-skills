version: 2

unit_tests:
  - name: test_edwtd_fa_future_wf_n_capital_future_org_src23nf_01_mart_n_capital_future_org_filter_basic
    model: edwtd_fa_future_wf_n_capital_future_org_src23nf_01_mart_n_capital_future_org
    description: "Verify filter transformation passes expected rows"
    given:
      - input: source('raw', 'cap_organizations')
        rows:
          - {id: 1, status: 'ACTIVE'}
          - {id: 2, status: 'INACTIVE'}
    expect:
      rows:
        - {id: 1, status: 'ACTIVE'}
  - name: test_edwtd_fa_future_wf_n_capital_future_org_src23nf_01_mart_n_capital_future_org_expression_transform
    model: edwtd_fa_future_wf_n_capital_future_org_src23nf_01_mart_n_capital_future_org
    description: "Verify expression transformation logic"
    given:
      - input: source('raw', 'cap_organizations')
        rows:
          - {col1: 'test', col2: 100}
    expect:
      rows:
        - {col1: 'test', col2: 100}
